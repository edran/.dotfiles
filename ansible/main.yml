---
- hosts: all
  vars_prompt:
    - name: ansible_become_password
      prompt: BECOME password
      private: true

  vars:
    downloads: ~/.ansible-downloads/

    dockitems_remove:
        - Launchpad
        - Safari
        - Messages
        - Mail
        - Maps
        - Photos
        - FaceTime
        - Calendar
        - Contacts
        - Reminders
        - Notes
        - TV
        - Music
        - Podcasts
        - News
        - Keynote
        - Numbers
        - Pages
        - App Store
        - System Settings

    dockitems_persist:
        - name: Google Chrome
          path: /Applications/Google Chrome.app
          pos: 1
        - name: Emacs
          path: /Applications/Emacs.app
          pos: 2
        - name: iTerm
          path: /Applications/iTerm.app
          pos: 3
        - name: Slack
          path: /Applications/Slack.app
          pos: 4
        - name: Notion
          path: /Applications/Notion.app
          pos: 5
        - name: Linear
          path: /Applications/Linear.app
          pos: 6
        - name: Spotify
          path: /Applications/Spotify.app
          pos: 7
        - name: Whatsapp
          path: /Applications/Whatsapp.app
          pos: 8
        - name: Signal
          path: /Applications/Signal.app
          pos: 9
        - name: Anki
          path: /Applications/Anki.app
          pos: 10

    homebrew_taps:
        - railwaycat/emacsmacport
        - FelixKratz/formulae
        - getantibody/tap
        - nikitabobko/tap

    homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts.machine == 'arm64' else '/usr/local' }}"
    homebrew_brew_bin_path: "{{ homebrew_prefix }}/bin"

    homebrew_trusted_taps:
        - felixkratz/formulae
        - nikitabobko/tap

    fish_shell_path: "{{ '/opt/homebrew/bin/fish' if ansible_facts.architecture == 'arm64' else '/usr/local/bin/fish' }}"

    mise_bin: "{{ ansible_facts.env.HOME }}/.local/bin/mise"
    simple_bar_repo: https://github.com/Jean-Tinland/simple-bar.git
    simple_bar_server_repo: https://github.com/Jean-Tinland/simple-bar-server.git
    simple_bar_server_dir: "{{ ansible_facts.env.HOME }}/.local/share/simple-bar-server"
    simple_bar_server_mise_config_src: "{{ inventory_dir }}/../dots/macos/simple-bar-server.mise.toml"
    simple_bar_widgets_dir: "{{ ansible_facts.env.HOME }}/Library/Application Support/Übersicht/widgets"
    simple_bar_widget_dir: "{{ simple_bar_widgets_dir }}/simple-bar"
    simple_bar_config_src: "{{ inventory_dir }}/../dots/macos/simplebarrc"
    simple_bar_config_dest: "{{ ansible_facts.env.HOME }}/.simplebarrc"

    homebrew_installed_packages:
        # - ansible # Installed via Pip.
        # GNU tools
        - autoconf
        - automake
        - bash # Because MacOS ships with an old version.
        - gpg
        # CLI essentials
        # NOTE: I'd much rather use only hunspell, howerver spell-fu on Emacs
        # does not support generating word lists with anything other than aspell
        # yet.
        - aspell
        - curl
        - direnv
        - fish
        - fzf
        - git
        - git-delta
        - git-lfs
        - gh
        - iperf3
        - nmap
        - nnn
        - pv # Progress bar for pipes.
        - ripgrep
        - ssh-copy-id
        - starship
        - wget
        - tmux
        - zellij  # Replacement for tmux
        # Needed for Emacs
        # Remember to cp installation into /Applications
        - tree-sitter
        - tree-sitter-cli
        - jansson
        - libxml2
        - imagemagick
        # FIXME: this doesn't work -- the emacs-mac formula seems to generate a
        # warning due to the equivalent cask, which breaks the task.
        # The workaround is to do a manual install:
        # $ brew install emacs-mac --with-modules \
        #     --with-native-compilation --with-no-title-bars \
        #     --with-xwidgets --with-emacs-bi-sur-icon \
        #     --with-librsvg --with-tree-sitter
        # - { name: emacs-mac,
        #     install_options: [
        #       with-modules,
        #       with-native-compilation,
        #       with-no-title-bars,
        #       with-xwidgets,
        #       with-emacs-big-sur-icon,
        #       with-librsvg,
        #       with-tree-sitter,
        #     ]
        #   }

        # Modern CLI tooling
        - angle-grinder # a.k.a. *agrinder*, log analysis.
        - bat # Replaces cat.
        - bottom # a.k.a. *btm*, replaces htop.
        - broot # a.k.a. *br*, replaces tree (?).
        - choose-rust # cut
        - croc # Send files across devices.
        - ctop # Top for containers.
        - difftastic # a.k.a. *difft*, replaces diff.
        - glances # htop, again.
        - glow # Markdown on the terminal.
        - dive # Analyse docker images.
        - dust # du
        - entr # Run arbitrary commands on file changes.
        - eza # ls
        - duf # df
        - fd # find
        - fq # Explore binary files (like jq, ish).
        - fx # Interactive json tool.
        - gdu # ncdu
        - gping # Graphical ping.
        - hexyl # hexdump
        - htmlq # jq for html.
        - hyperfine # Benchmarking tool.
        - jc # Convert various tools' output to json.
        - jless # JSON pager.
        - jo # Easily create json objects.
        - jq
        - lazydocker # TUI for docker.
        - lnav # Curses-based log viewing.
        - most # A better less
        - mtr # traceroute
        - pgcli # psql
        - procs # ps
        - sd # sed
        - tealdeer # A fast tldr client.
        - wrk # HTTP benchmarking.
        - xsv # CSV manipulator.
        - yq # jq for YAML.
        - zoxide # z, fast, autojump
        # Languages
        - go
        - nvm
        - pyenv
        # Fun / useful
        - gifsicle
        - fortune
        - fastfetch
        - switchaudio-osx
        # Hell
        - awscli

    homebrew_trusted_installed_packages:
        - borders  # JankyBorders!
        - sketchybar

    homebrew_trusted_cask_apps:
        - nikitabobko/tap/aerospace

    homebrew_cask_appdir: /Applications
    homebrew_cask_accept_external_apps: true
    homebrew_cask_apps:
        - alfred
        - anki
        - chrysalis
        - docker
        - discord
        - dropbox
        - firefox
        - font-hack-nerd-font
        - ghostty
        - handbrake
        - httpie # A friendly curl replacement.
        - iterm2
        - karabiner-elements
        - linear
        # - notion
        - postman
        - sf-symbols
        - signal
        # - slack
        - spotify
        - teamviewer
        - transmit
        - wezterm
        - whatsapp
        - xbar
        - zotero
        # Why tho
        - google-cloud-sdk

    mas_installed_apps:
        - { id: 682658836, name: GarageBand }
        - { id: 408981434, name: iMovie }
        # These iWork apps are account/region dependent in `mas` and can fail
        # with an empty install error even when other MAS apps install cleanly.
        # - { id: 409201541, name: Pages }
        # - { id: 409203825, name: Numbers }
        # - { id: 409183694, name: Keynote }
        - { id: 419330170, name: Moom }
        - { id: 1475387142, name: Tailscale }

    dots_dirs:
      - .config/bat
      - .config/zellij
      - .config/karabiner
      - .config/karabiner/assets/complex_modifications

    dots_links:
        - { src: bin, dest: bin }
        - { src: fish, dest: .config/fish }
        - { src: doom.d, dest: .doom.d }
        - { src: git/config, dest: .gitconfig }
        - { src: git/ignore, dest: .gitignore }
        - { src: macos/aerospace.toml, dest: .aerospace.toml }
        - { src: macos/sketchybar, dest: .config/sketchybar }
        - { src: bat.config, dest: .config/bat/config}
        - { src: nethackrc, dest: .nethackrc }
        - { src: profile, dest: .profile }
        # Keep ~/.ssh as a real directory; replacing it with a symlink fails on
        # existing macOS installs and risks mixing private host-specific files.
        # - { src: ssh, dest: .ssh }
        - { src: tmux.conf, dest: .tmux.conf }
        - { src: zellij.kdl, dest: .config/zellij/config.kdl }
        - { src: vimrc, dest: .vimrc }
        - { src: wezterm.lua, dest: .wezterm.lua }
        - { src: starship.toml, dest: .config/starship.toml }

    karabiner_links:
        - { src: karabiner.json, dest: .config/karabiner/karabiner.json }
        - { src: assets/complex_modifications/1511610894.json, dest: .config/karabiner/assets/complex_modifications/1511610894.json }

  roles:
    - role: elliotweiser.osx-command-line-tools
    - role: geerlingguy.mac.homebrew
      tags: [homebrew]
    - role: geerlingguy.mac.mas
      tags: [mas]

  tasks:
    - name: Read trusted Homebrew entries
      command: "{{ homebrew_brew_bin_path }}/brew trust --json=v1"
      register: homebrew_trust
      changed_when: false
      check_mode: false
      tags: [homebrew]

    - name: Trust Homebrew taps required by this installer
      command: "{{ homebrew_brew_bin_path }}/brew trust --tap {{ item }}"
      loop: "{{ homebrew_trusted_taps }}"
      when: item not in (homebrew_trust.stdout | from_json).taps
      tags: [homebrew]

    - name: Ensure trusted Homebrew cask applications are installed
      community.general.homebrew_cask:
        name: "{{ item.name | default(item) }}"
        state: present
        install_options: "{{ item.install_options | default('appdir=' + homebrew_cask_appdir) }}"
        accept_external_apps: "{{ homebrew_cask_accept_external_apps }}"
        sudo_password: "{{ ansible_become_password | default(omit) }}"
      loop: "{{ homebrew_trusted_cask_apps }}"
      tags: [homebrew]

    - name: Ensure trusted Homebrew packages are installed
      community.general.homebrew:
        path: "{{ homebrew_brew_bin_path }}"
        name: "{{ item.name | default(item) }}"
        install_options: "{{ item.install_options | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ homebrew_trusted_installed_packages }}"
      tags: [homebrew]

    - name: Ensure Übersicht is installed
      community.general.homebrew_cask:
        name: ubersicht
        state: present
        install_options: "appdir={{ homebrew_cask_appdir }}"
        accept_external_apps: "{{ homebrew_cask_accept_external_apps }}"
        sudo_password: "{{ ansible_become_password | default(omit) }}"
      tags: [homebrew, simple_bar]

    - name: Ensure Übersicht widgets directory exists
      file:
        path: "{{ simple_bar_widgets_dir }}"
        state: directory
        mode: "0755"
      tags: [simple_bar]

    - name: Install simple-bar widget
      git:
        repo: "{{ simple_bar_repo }}"
        dest: "{{ simple_bar_widget_dir }}"
        version: master
        depth: 1
        update: true
        force: true
      tags: [simple_bar]

    - name: Inspect simple-bar config destination
      stat:
        path: "{{ simple_bar_config_dest }}"
        follow: false
      register: simple_bar_config_dest_stat
      tags: [simple_bar]

    - name: Remove symlinked simple-bar config
      file:
        path: "{{ simple_bar_config_dest }}"
        state: absent
      when: simple_bar_config_dest_stat.stat.islnk | default(false)
      tags: [simple_bar]

    - name: Copy simple-bar config
      copy:
        src: "{{ simple_bar_config_src }}"
        dest: "{{ simple_bar_config_dest }}"
        mode: "0644"
        force: false
      tags: [simple_bar]

    - name: Configure simple-bar window manager
      replace:
        path: "{{ simple_bar_config_dest }}"
        regexp: '"windowManager": "[^"]+"'
        replace: '"windowManager": "aerospace"'
      tags: [simple_bar]

    - name: Configure simple-bar AeroSpace path
      replace:
        path: "{{ simple_bar_config_dest }}"
        regexp: '"aerospacePath": "[^"]+"'
        replace: '"aerospacePath": "/opt/homebrew/bin/aerospace"'
      tags: [simple_bar]

    - name: Configure simple-bar shell
      replace:
        path: "{{ simple_bar_config_dest }}"
        regexp: '"shell": "[^"]+"'
        replace: '"shell": "/bin/zsh"'
      tags: [simple_bar]

    - name: Configure simple-bar server socket port
      replace:
        path: "{{ simple_bar_config_dest }}"
        regexp: '"serverSocketPort": [0-9]+'
        replace: '"serverSocketPort": 7777'
      tags: [simple_bar]

    - name: Enable simple-bar server support
      replace:
        path: "{{ simple_bar_config_dest }}"
        regexp: '"enableServer": (true|false)'
        replace: '"enableServer": true'
      tags: [simple_bar]

    - name: Enable simple-bar AeroSpace server refresh
      replace:
        path: "{{ simple_bar_config_dest }}"
        regexp: '"aerospaceServerRefresh": (true|false)'
        replace: '"aerospaceServerRefresh": true'
      tags: [simple_bar]

    - name: Ensure mise is installed
      community.general.homebrew:
        path: "{{ homebrew_brew_bin_path }}"
        name: mise
        state: present
      tags: [homebrew, simple_bar]

    - name: Ensure mise local bin directory exists
      file:
        path: "{{ mise_bin | dirname }}"
        state: directory
        mode: "0755"
      tags: [simple_bar]

    - name: Inspect mise local binary
      stat:
        path: "{{ mise_bin }}"
      register: mise_local_binary
      tags: [simple_bar]

    - name: Link Homebrew mise into local bin
      file:
        src: "{{ homebrew_brew_bin_path }}/mise"
        dest: "{{ mise_bin }}"
        state: link
      when: not mise_local_binary.stat.exists
      tags: [simple_bar]

    - name: Check mise is installed
      stat:
        path: "{{ mise_bin }}"
      register: mise_binary
      tags: [simple_bar]

    - name: Require mise for simple-bar-server
      fail:
        msg: "mise is required to manage simple-bar-server's Node runtime. Install mise before running the simple_bar tag."
      when: not mise_binary.stat.exists
      tags: [simple_bar]

    - name: Ensure simple-bar-server parent directory exists
      file:
        path: "{{ ansible_facts.env.HOME }}/.local/share"
        state: directory
        mode: "0755"
      tags: [simple_bar]

    - name: Install simple-bar-server
      git:
        repo: "{{ simple_bar_server_repo }}"
        dest: "{{ simple_bar_server_dir }}"
        version: main
        depth: 1
        update: true
      tags: [simple_bar]

    - name: Configure simple-bar-server mise tools
      copy:
        src: "{{ simple_bar_server_mise_config_src }}"
        dest: "{{ simple_bar_server_dir }}/mise.toml"
        mode: "0644"
      tags: [simple_bar]

    - name: Trust simple-bar-server mise config
      command:
        argv:
          - "{{ mise_bin }}"
          - trust
          - "{{ simple_bar_server_dir }}/mise.toml"
      changed_when: false
      tags: [simple_bar]

    - name: Install simple-bar-server mise tools
      command:
        argv:
          - "{{ mise_bin }}"
          - install
          - -C
          - "{{ simple_bar_server_dir }}"
          - -y
      register: simple_bar_server_mise_install
      changed_when: "'installed' in simple_bar_server_mise_install.stdout or 'installing' in simple_bar_server_mise_install.stdout"
      tags: [simple_bar]

    - name: Install simple-bar-server dependencies
      command:
        argv:
          - "{{ mise_bin }}"
          - exec
          - -C
          - "{{ simple_bar_server_dir }}"
          - --
          - npm
          - install
      args:
        creates: "{{ simple_bar_server_dir }}/node_modules/ws/package.json"
      tags: [simple_bar]

    - name: Start simple-bar-server
      command:
        argv:
          - "{{ mise_bin }}"
          - run
          - -C
          - "{{ simple_bar_server_dir }}"
          - start
      register: simple_bar_server_start
      changed_when: "'online' in simple_bar_server_start.stdout or 'started' in simple_bar_server_start.stdout or 'restarted' in simple_bar_server_start.stdout"
      tags: [simple_bar]

    - name: Stop SketchyBar Homebrew service while using simple-bar
      command: "{{ homebrew_brew_bin_path }}/brew services stop sketchybar"
      register: sketchybar_service_stop
      changed_when: "'Successfully stopped' in sketchybar_service_stop.stdout"
      tags: [simple_bar]

    - name: Stop running SketchyBar process while using simple-bar
      command: killall sketchybar
      register: sketchybar_process_stop
      failed_when: sketchybar_process_stop.rc not in [0, 1]
      changed_when: sketchybar_process_stop.rc == 0
      tags: [simple_bar]

    - name: Launch Übersicht
      command:
        argv:
          - open
          - -g
          - -b
          - tracesOf.Uebersicht
      changed_when: false
      tags: [simple_bar]

    - name: Refresh simple-bar widget
      command:
        argv:
          - osascript
          - -e
          - tell application id "tracesOf.Uebersicht" to refresh widget id "simple-bar-index-jsx"
      changed_when: false
      tags: [simple_bar]

    - name: Ensure fish is an allowed login shell
      become: true
      lineinfile:
        path: /etc/shells
        line: "{{ fish_shell_path }}"
        state: present
      tags: [shell]

    - name: Read current login shell
      command: "dscl . -read /Users/{{ ansible_facts.env.USER }} UserShell"
      register: current_login_shell
      changed_when: false
      tags: [shell]

    - name: Use fish as login shell
      become: true
      command: "chsh -s {{ fish_shell_path }} {{ ansible_facts.env.USER }}"
      when: fish_shell_path not in current_login_shell.stdout
      tags: [shell]

    - name: Ensure config directories exist
      file:
        path: "{{ ansible_facts.env.HOME }}/{{ item }}"
        state: directory
      loop: "{{ dots_dirs }}"
      tags: [quick]

    - name: Link dots in various places
      file:
        src: "{{ inventory_dir }}/../dots/{{ item.src }}"
        dest: "{{ ansible_facts.env.HOME }}/{{ item.dest }}"
        state: link
      loop: "{{ dots_links }}"
      tags: [quick]

    - name: Link Karabiner config files
      file:
        src: "{{ inventory_dir }}/../dots/macos/karabiner/{{ item.src }}"
        dest: "{{ ansible_facts.env.HOME }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ karabiner_links }}"
      tags: [quick]

    - name: Include Dock role.
      include_role:
        name: geerlingguy.mac.dock
        apply:
          tags: [dock]
      tags: [always]

    - name: Ensure xbar plugin directory exists
      file:
        path: "{{ ansible_facts.env.HOME }}/Library/Application Support/xbar/plugins"
        state: directory
        mode: "0755"
      tags: [quick]

    - name: Link script to xbar
      file:
        src: "{{ item }}"
        dest: "{{ ansible_facts.env.HOME }}/Library/Application Support/xbar/plugins/{{ item | basename }}"
        state: link
      with_fileglob:
        - "{{ inventory_dir }}/../dots/macos/xbar/*"
      tags: [quick]

    - name: Group windows by application in expose
      community.general.osx_defaults:
        domain: com.apple.dock
        key: expose-group-apps
        type: bool
        value: true
        state: present
      notify: Restart Dock
      tags: [quick]
    - name: Autohide dock
      community.general.osx_defaults:
        domain: com.apple.dock
        key: autohide
        type: bool
        value: true
        state: present
      notify: Restart Dock
      tags: [quick]
    - name: Make dock icons small
      community.general.osx_defaults:
        domain: com.apple.dock
        key: tilesize
        type: float
        value: 24.0
        state: present
      notify: Restart Dock
      tags: [quick]
    - name: Use a simple window minimize animation
      community.general.osx_defaults:
        domain: com.apple.dock
        key: mineffect
        type: string
        value: genie
        state: present
      notify: Restart Dock
      tags: [quick]
    - name: Add ability to scroll up on dock icon to see app instances
      community.general.osx_defaults:
        domain: com.apple.dock
        key: scroll-to-open
        type: bool
        value: true
        state: present
      notify: Restart Dock
      tags: [quick]

    - name: Set OS languages
      community.general.osx_defaults:
        key: AppleLanguages
        type: array
        value:
          - en-US
      notify: Restart SystemUIServer
      tags: [quick]

    - name: Hide menu bar until mouse hover
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: _HIHideMenuBar
        type: bool
        value: true
        state: present
      notify: Restart SystemUIServer
      tags: [quick, menu_bar]

    - name: Hide menu bar in full screen too
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleMenuBarVisibleInFullscreen
        type: bool
        value: false
        state: present
      notify: Restart SystemUIServer
      tags: [quick, menu_bar]

    - name: Apply live menu bar autohide preference
      command:
        argv:
          - osascript
          - -e
          - tell application "System Events" to set autohide menu bar of dock preferences to true
      changed_when: false
      tags: [quick, menu_bar]

    - name: Make menu bar material opaque
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleReduceTransparency
        type: bool
        value: true
        state: present
      notify: Restart SystemUIServer
      tags: [quick, menu_bar]

    - name: Set displays to have separate spaces
      community.general.osx_defaults:
        domain: com.apple.spaces
        key: spans-displays
        type: bool
        value: true
        state: present
      notify: Restart SystemUIServer
      tags: [quick]
    - name: Ensure screenshot directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ ansible_facts.env.HOME }}/Desktop/screenshots"
        - "{{ ansible_facts.env.HOME }}/Desktop/screenshots/simulator"
      tags: [quick]
    - name: Set default directory for screenshots
      community.general.osx_defaults:
        domain: com.apple.screencapture
        key: location
        type: string
        value: "{{ ansible_facts.env.HOME }}/Desktop/screenshots"
        state: present
      notify: Restart SystemUIServer
      tags: [quick]
    - name: Set default directory for Simulator screenshots
      community.general.osx_defaults:
        domain: com.apple.iphonesimulator
        key: ScreenShotSaveLocation
        type: string
        value: "{{ ansible_facts.env.HOME }}/Desktop/screenshots/simulator"
        state: present
      tags: [quick]

    # Finder
    - name: Show hidden files
      community.general.osx_defaults:
        domain: com.apple.finder
        key: AppleShowAllFiles
        type: bool
        value: true
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Show file extensions
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleShowAllExtensions
        type: bool
        value: true
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Show path bar
      community.general.osx_defaults:
        domain: com.apple.finder
        key: ShowPathbar
        type: bool
        value: true
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Show folders on top
      community.general.osx_defaults:
        domain: com.apple.finder
        key: _FXSortFoldersFirst
        type: bool
        value: true
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Set default view to column
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXPreferredViewStyle
        type: string
        value: clmv
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Empty bin after 30 days
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXRemoveOldTrashItems
        type: bool
        value: true
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Disable warning when changing a file extension
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXEnableExtensionChangeWarning
        type: bool
        value: false
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Make side icons smaller
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSTableViewDefaultSizeMode
        type: int
        value: 1
        state: present
      notify: Restart Finder
      tags: [quick]
    - name: Keep folders on top in desktop
      community.general.osx_defaults:
        domain: com.apple.finder
        key: _FXSortFoldersFirstOnDesktop
        type: bool
        value: true
        state: present
      notify: Restart Finder
      tags: [quick]

    # Trackpad
    - name: Switch to sane scrolling direction
      community.general.osx_defaults:
        key: com.apple.swipescrolldirection
        type: bool
        value: false
        state: present
      tags: [quick]

    # TextEdit
    - name: Disable smart quotes
      community.general.osx_defaults:
        domain: com.apple.TextEdit
        key: SmartQuotes
        type: bool
        value: false
        state: present
      tags: [quick]
    - name: Set TextEdit to default to txt
      community.general.osx_defaults:
        domain: com.apple.TextEdit
        key: RichText
        type: int
        value: 0
        state: present
      tags: [quick]

    # Other stuff
    - name: Disable terminal login message
      file:
        path: "{{ ansible_facts.env.HOME }}/.hushlogin"
        mode: "0644"
        state: touch
      tags: [quick]

    # Disabled for now: this writes a persistent launchd PATH for user
    # sessions, requires sudo plus a reboot, and {{ ansible_facts.env.PATH }} depends
    # on how Ansible was launched rather than an explicit desired GUI PATH.
    # - name: Make sure that apps can use PATH
    #   become: yes
    #   become_method: sudo
    #   command: "launchctl config user path {{ ansible_facts.env.PATH }}"

  handlers:
    - name: Restart Dock
      command: killall Dock

    - name: Restart Finder
      command: killall Finder

    - name: Restart SystemUIServer
      command: killall SystemUIServer
